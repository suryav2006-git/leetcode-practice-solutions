name: Update LeetCode Table

on:
  push:
    branches:
      - main
    paths:
      - 'Easy/**'
      - 'Medium/**'
      - 'Hard/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate Markdown Table
        run: |
          python -c '
          import os
          import re

          table_content = "| # | Problem Name | Difficulty | Language | Solution |\n|---|---|---|---|---|\n"
          categories = {"Easy": "🟢 Easy", "Medium": "🟡 Medium", "Hard": "🔴 Hard"}
          
          for cat_folder, difficulty_label in categories.items():
              if not os.path.exists(cat_folder):
                  continue
                  
              for problem_dir in sorted(os.listdir(cat_folder)):
                  dir_path = os.path.join(cat_folder, problem_dir)
                  if os.path.isdir(dir_path):
                      match = re.match(r"^(\d+)-(.*)$", problem_dir)
                      if match:
                          prob_num = match.group(1)
                          prob_slug = match.group(2)
                          prob_name = prob_slug.replace("-", " ").title()
                          
                          files = os.listdir(dir_path)
                          langs = []
                          if any(f.endswith(".py") for f in files): langs.append("Python")
                          if any(f.endswith(".cpp") or f.endswith(".cc") for f in files): langs.append("C++")
                          if any(f.endswith(".java") for f in files): langs.append("Java")
                          if any(f.endswith(".js") or f.endswith(".ts") for f in files): langs.append("JavaScript")
                          
                          lang_str = " / ".join(langs) if langs else "Code"
                          leetcode_url = f"https://leetcode.com{prob_slug}/"
                          repo_path = f"./{cat_folder}/{problem_dir}/"
                          
                          table_content += f"| {prob_num} | [{prob_name}]({leetcode_url}) | {difficulty_label} | {lang_str} | [View]({repo_path}) |\n"

          with open("README.md", "r", encoding="utf-8") as f:
              readme = f.read()

          pattern = r"<!-- LEETCODE_TABLE_START -->.*?<!-- LEETCODE_TABLE_END -->"
          replacement = f"<!-- LEETCODE_TABLE_START -->\n\n{table_content}\n<!-- LEETCODE_TABLE_END -->"
          updated_readme = re.sub(pattern, replacement, readme, flags=re.DOTALL)

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(updated_readme)
          '

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@://github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git diff-index --quiet HEAD || git commit -m "docs: auto-update solutions table dashboard [skip ci]"
          git push
